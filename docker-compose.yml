version: '3.8'

services:
  web:
    build: .
    container_name: personal-library-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-super-secret-key-change-in-production}
      - DATABASE_URL=sqlite:///app/library.db
    volumes:
      - library_data:/app
    restart: unless-stopped

volumes:
  library_data:
